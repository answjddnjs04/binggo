<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎉 빙고 사이트 - 1조 ~ 6조</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&amp;display=swap');
        
        .tail-container {
            font-family: 'Nanum Pen Script', system-ui;
        }
        
        .bingo-cell {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .bingo-cell:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
        }
        
        .bingo-cell.marked {
            background-color: #22c55e !important;
            color: white !important;
            text-decoration: line-through;
            transform: rotate(2deg);
        }
        
        .bingo-cell.marked::after {
            content: '✅';
            position: absolute;
            font-size: 40px;
            opacity: 0.9;
        }
        
        .tab-active {
            background-color: #eab308;
            color: black;
            box-shadow: 0 0 15px #eab308;
        }
        
        .header-bg {
            background: linear-gradient(135deg, #7c3aed, #ec4899);
        }
    </style>
</head>
<body class="tail-container bg-zinc-950 text-white min-h-screen">
    <div class="max-w-5xl mx-auto p-6">
        <!-- 헤더 -->
        <div class="header-bg rounded-3xl p-8 mb-8 text-center shadow-2xl">
            <h1 class="text-6xl font-bold tracking-wider mb-2">🎲 빙고 게임</h1>
            <p class="text-3xl text-yellow-300">1조 ~ 6조 대전용 4x4 빙고판</p>
            <p class="mt-3 text-lg opacity-90">각 조별 독립 빙고판 • 클릭해서 마킹 • 한 줄 완성 시 빙고!</p>
        </div>

        <!-- 탭 -->
        <div class="flex flex-wrap gap-3 justify-center mb-10" id="tabs">
            <!-- JS로 생성 -->
        </div>

        <!-- 메인 컨텐츠 -->
        <div class="bg-zinc-900 rounded-3xl p-8 shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <span id="current-group" class="text-5xl font-bold text-yellow-400">1조</span>
                    <span class="text-2xl text-zinc-400">빙고판</span>
                </div>
                
                <div class="flex gap-3">
                    <button onclick="reshuffleCurrent()" 
                            class="px-8 py-4 bg-violet-600 hover:bg-violet-700 rounded-2xl font-bold text-lg flex items-center gap-2 transition">
                        🎲 번호 재생성
                    </button>
                    <button onclick="resetCurrent()" 
                            class="px-8 py-4 bg-zinc-700 hover:bg-zinc-600 rounded-2xl font-bold text-lg flex items-center gap-2 transition">
                        🗑 초기화
                    </button>
                </div>
            </div>

            <!-- 빙고판 -->
            <div id="board" 
                 class="grid grid-cols-4 gap-4 max-w-[520px] mx-auto">
                <!-- JS로 셀 생성 -->
            </div>

            <!-- 안내 -->
            <div class="mt-8 text-center text-zinc-400 text-lg">
                📌 칸을 클릭하면 마킹됩니다.<br>
                가로 / 세로 한 줄 완성 → <span class="text-green-400 font-bold">빙고!</span>
            </div>
        </div>

        <!-- 푸터 -->
        <div class="mt-12 text-center text-zinc-500 text-sm">
            세계 최고의 웹 개발자가 만든 빙고 사이트 ❤️<br>
            Cloudflare Pages에 index.html 하나만 올리면 바로 배포 완료!
        </div>
    </div>

    <script>
        // Tailwind 스크립트 실행
        function initializeTailwind() {
            // 이미 CDN으로 로드됨
        }

        // 데이터 저장소
        let boardsData = {};
        let currentGroup = 1;

        // Fisher-Yates 셔플
        function shuffle(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        // 초기 데이터 생성
        function initBoards() {
            for (let group = 1; group <= 6; group++) {
                let numbers = Array.from({ length: 16 }, (_, i) => i + 1);
                numbers = shuffle(numbers);
                boardsData[group] = {
                    numbers: numbers,
                    marked: new Set()
                };
            }
        }

        // 탭 생성
        function createTabs() {
            const tabsContainer = document.getElementById('tabs');
            for (let i = 1; i <= 6; i++) {
                const btn = document.createElement('button');
                btn.className = `tab-btn px-10 py-5 text-3xl font-bold rounded-3xl transition-all ${i === 1 ? 'tab-active' : 'bg-zinc-800 hover:bg-zinc-700'}`;
                btn.textContent = `${i}조`;
                btn.onclick = () => switchGroup(i);
                tabsContainer.appendChild(btn);
            }
        }

        // 현재 그룹 전환
        function switchGroup(group) {
            currentGroup = group;
            
            // 탭 스타일 업데이트
            document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
                if (parseInt(btn.textContent) === group) {
                    btn.classList.add('tab-active');
                } else {
                    btn.classList.remove('tab-active');
                }
            });
            
            document.getElementById('current-group').textContent = `${group}조`;
            renderBoard();
        }

        // 빙고판 렌더링
        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            
            const data = boardsData[currentGroup];
            const size = 4;
            
            data.numbers.forEach((num, index) => {
                const cell = document.createElement('div');
                cell.className = `
                    bingo-cell relative aspect-square flex items-center justify-center 
                    bg-zinc-800 hover:bg-zinc-700 border-4 border-yellow-400 
                    text-6xl font-bold rounded-3xl cursor-pointer select-none
                `;
                
                // 이미 마킹된 상태 적용
                if (data.marked.has(index)) {
                    cell.classList.add('marked');
                }
                
                cell.innerHTML = `<span>${num}</span>`;
                
                // 클릭 이벤트
                cell.onclick = () => {
                    toggleMark(index);
                };
                
                boardEl.appendChild(cell);
            });
        }

        // 마킹 토글
        function toggleMark(index) {
            const data = boardsData[currentGroup];
            
            if (data.marked.has(index)) {
                data.marked.delete(index);
            } else {
                data.marked.add(index);
            }
            
            renderBoard();
            checkBingo();
        }

        // 빙고 체크 (행, 열, 대각선)
        function checkBingo() {
            const data = boardsData[currentGroup];
            const size = 4;
            const marked = data.marked;
            
            // 행 체크
            for (let row = 0; row < size; row++) {
                let complete = true;
                for (let col = 0; col < size; col++) {
                    const idx = row * size + col;
                    if (!marked.has(idx)) {
                        complete = false;
                        break;
                    }
                }
                if (complete) {
                    showBingoAlert();
                    return;
                }
            }
            
            // 열 체크
            for (let col = 0; col < size; col++) {
                let complete = true;
                for (let row = 0; row < size; row++) {
                    const idx = row * size + col;
                    if (!marked.has(idx)) {
                        complete = false;
                        break;
                    }
                }
                if (complete) {
                    showBingoAlert();
                    return;
                }
            }
            
            // 주 대각선
            let mainDiag = true;
            for (let i = 0; i < size; i++) {
                if (!marked.has(i * size + i)) {
                    mainDiag = false;
                    break;
                }
            }
            if (mainDiag) {
                showBingoAlert();
                return;
            }
            
            // 반대 대각선
            let antiDiag = true;
            for (let i = 0; i < size; i++) {
                if (!marked.has(i * size + (size - 1 - i))) {
                    antiDiag = false;
                    break;
                }
            }
            if (antiDiag) {
                showBingoAlert();
            }
        }

        function showBingoAlert() {
            const groupName = `${currentGroup}조`;
            
            // 화려한 알림
            const alertDiv = document.createElement('div');
            alertDiv.className = `
                fixed inset-0 flex items-center justify-center bg-black/80 z-50
            `;
            alertDiv.innerHTML = `
                <div class="bg-gradient-to-br from-yellow-400 to-pink-500 text-black p-16 rounded-3xl text-center shadow-2xl">
                    <div class="text-8xl mb-6">🎉🎉🎉</div>
                    <div class="text-7xl font-black tracking-widest mb-4">${groupName}</div>
                    <div class="text-8xl font-black text-white drop-shadow-lg">BINGO!!!</div>
                    <div class="mt-8 text-3xl font-bold">축하합니다! 🎊</div>
                    <button onclick="this.parentElement.parentElement.remove()" 
                            class="mt-10 px-16 py-6 bg-black text-white rounded-2xl text-3xl font-bold hover:scale-110 transition">
                        계속하기
                    </button>
                </div>
            `;
            document.body.appendChild(alertDiv);
            
            // 간단한 효과음 (브라우저 알림음)
            try {
                new Audio('https://assets.mixkit.co/sfx/preview/296/296-preview.mp3').play().catch(()=>{});
            } catch(e) {}
        }

        // 현재 조 번호 재생성
        function reshuffleCurrent() {
            const data = boardsData[currentGroup];
            let numbers = Array.from({ length: 16 }, (_, i) => i + 1);
            data.numbers = shuffle(numbers);
            data.marked.clear();
            renderBoard();
        }

        // 현재 조 초기화
        function resetCurrent() {
            if (!confirm(`${currentGroup}조 빙고판을 완전히 초기화할까요?`)) return;
            boardsData[currentGroup].marked.clear();
            renderBoard();
        }

        // 키보드 단축키 (편의성)
        function addKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                if (e.key === 'r' || e.key === 'R') {
                    reshuffleCurrent();
                }
                if (e.key === 'c' || e.key === 'C') {
                    resetCurrent();
                }
            });
        }

        // 초기화 실행
        function init() {
            initBoards();
            createTabs();
            switchGroup(1); // 1조부터 시작
            addKeyboardShortcuts();
            
            // 첫 렌더링
            renderBoard();
            
            // Tailwind 초기화
            initializeTailwind();
        }

        // 페이지 로드 시 실행
        window.onload = init;
    </script>
</body>
</html>
