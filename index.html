<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINGO 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .title { font-family: 'Space Grotesk', sans-serif; }
        
        .bingo-cell {
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .bingo-cell:hover {
            transform: scale(1.04);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }
        .bingo-cell .photo-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0.25;
            transition: opacity 0.3s;
        }
        .bingo-cell:hover .photo-bg { opacity: 0.35; }
        
        .bingo-cell.marked {
            background: linear-gradient(135deg, #22c55e, #4ade80) !important;
        }
        .bingo-cell.marked .photo-bg { opacity: 0.1; }
        .bingo-cell.marked .content { color: #000 !important; }
        
        .neon { text-shadow: 0 0 30px rgb(163 163 163 / 0.6); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div class="max-w-6xl mx-auto px-6 py-12">
        <!-- 헤더 -->
        <div class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-3xl">🎲</div>
                <div>
                    <h1 class="title text-6xl font-bold tracking-tighter neon">BINGO</h1>
                    <p class="text-zinc-400 text-xl">2026 TEAM BATTLE</p>
                </div>
            </div>
            
            <div class="flex items-center gap-6">
                <button onclick="showImportModal()" 
                        class="flex items-center gap-2 px-5 py-3 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-2xl text-sm font-medium">
                    <i class="fas fa-download"></i>
                    <span>데이터 불러오기</span>
                </button>
                <a href="admin.html" 
                   class="flex items-center gap-2 px-6 py-3 bg-white text-black font-semibold rounded-2xl hover:scale-105 transition">
                    <i class="fas fa-cog"></i>
                    관리자
                </a>
            </div>
        </div>

        <!-- 그룹 탭 -->
        <div class="flex flex-wrap gap-4 mb-12 justify-center" id="tabs"></div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <!-- 빙고판 -->
            <div class="lg:col-span-8">
                <div class="bg-zinc-900/80 backdrop-blur-2xl border border-zinc-800 rounded-3xl p-10">
                    <div class="flex items-center justify-between mb-8">
                        <div id="group-title" class="title text-6xl font-semibold text-white">1조</div>
                        <div class="flex gap-3">
                            <button onclick="reshuffleWarning()" 
                                    class="px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl flex items-center gap-2 text-sm">
                                <i class="fas fa-dice"></i> 번호 재배치
                            </button>
                            <button onclick="resetCurrentGroup()" 
                                    class="px-6 py-3 bg-zinc-800 hover:bg-red-900/30 text-red-400 rounded-2xl flex items-center gap-2 text-sm">
                                <i class="fas fa-trash"></i> 내 진행 초기화
                            </button>
                        </div>
                    </div>

                    <div id="board" class="grid grid-cols-4 gap-5"></div>
                </div>
            </div>

            <!-- 현재 선택된 칸 정보 -->
            <div class="lg:col-span-4">
                <div onclick="closeCellInfo()" id="cell-info" 
                     class="hidden bg-zinc-900/80 backdrop-blur-2xl border border-zinc-700 rounded-3xl p-8 cursor-pointer hover:border-zinc-500 transition">
                    <div class="flex justify-between items-start">
                        <div>
                            <div id="info-number" class="text-8xl font-bold title text-white"></div>
                            <div id="info-mission" class="mt-6 text-xl leading-relaxed text-zinc-300"></div>
                        </div>
                        <div id="info-photo" class="w-32 h-32 rounded-2xl overflow-hidden border border-zinc-700"></div>
                    </div>
                    <div class="text-xs text-zinc-500 mt-8">클릭한 칸의 미션과 사진입니다 • 다시 클릭하면 닫힘</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 데이터 불러오기 모달 -->
    <div id="import-modal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center">
        <div class="bg-zinc-900 rounded-3xl p-10 max-w-lg w-full">
            <h3 class="text-2xl font-semibold mb-6">관리자 JSON 붙여넣기</h3>
            <textarea id="import-json" rows="8" 
                      class="w-full bg-black border border-zinc-700 rounded-2xl p-6 text-sm font-mono resize-none"></textarea>
            <div class="flex gap-4 mt-6">
                <button onclick="hideImportModal()" 
                        class="flex-1 py-4 bg-zinc-800 rounded-2xl">취소</button>
                <button onclick="importData()" 
                        class="flex-1 py-4 bg-white text-black font-semibold rounded-2xl">불러오기</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 데이터 구조 ====================
        let sharedCells = [];           // 16개의 {number, mission, photo}
        let groupMarked = {};           // {1: Set(), 2: Set(), ...}
        let currentGroup = 1;

        const STORAGE_KEY = "bingo2026_shared";

        // ==================== 초기화 ====================
        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                sharedCells = data.cells || [];
                groupMarked = data.groupMarked || {};
            } else {
                // 기본 데이터 생성
                sharedCells = Array.from({length: 16}, (_, i) => ({
                    number: i + 1,
                    mission: "",
                    photo: ""
                }));
                // 번호 섞기
                shuffleNumbers();
                groupMarked = {};
            }
            
            // 모든 그룹에 marked Set 생성
            for (let g = 1; g <= 6; g++) {
                if (!groupMarked[g]) groupMarked[g] = [];
            }
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                cells: sharedCells,
                groupMarked: groupMarked
            }));
        }

        function shuffleNumbers() {
            let nums = Array.from({length:16}, (_,i) => i+1);
            nums.sort(() => Math.random() - 0.5);
            sharedCells.forEach((cell, i) => {
                cell.number = nums[i];
            });
        }

        // ==================== UI ====================
        function createTabs() {
            const container = document.getElementById('tabs');
            container.innerHTML = '';
            for (let i = 1; i <= 6; i++) {
                const btn = document.createElement('button');
                btn.className = `px-9 py-4 text-2xl font-medium rounded-3xl transition-all ${i===1 ? 'bg-white text-black shadow-2xl' : 'bg-zinc-900 hover:bg-zinc-800 border border-zinc-700'}`;
                btn.textContent = `${i}조`;
                btn.onclick = () => switchGroup(i);
                container.appendChild(btn);
            }
        }

        function switchGroup(g) {
            currentGroup = g;
            document.querySelectorAll('#tabs button').forEach(btn => {
                if (parseInt(btn.textContent) === g) {
                    btn.classList.add('bg-white', 'text-black', 'shadow-2xl');
                    btn.classList.remove('bg-zinc-900', 'border', 'border-zinc-700');
                } else {
                    btn.classList.remove('bg-white', 'text-black', 'shadow-2xl');
                    btn.classList.add('bg-zinc-900', 'border', 'border-zinc-700');
                }
            });
            document.getElementById('group-title').textContent = `${g}조`;
            renderBoard();
        }

        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            const markedSet = new Set(groupMarked[currentGroup] || []);
            
            sharedCells.forEach((cell, index) => {
                const div = document.createElement('div');
                div.className = `
                    bingo-cell aspect-square bg-zinc-900 border border-zinc-700 rounded-3xl flex flex-col 
                    items-center justify-center cursor-pointer relative overflow-hidden text-center
                `;
                if (markedSet.has(index)) div.classList.add('marked');

                // 사진 배경
                if (cell.photo) {
                    const img = document.createElement('div');
                    img.className = 'photo-bg';
                    img.style.backgroundImage = `url(${cell.photo})`;
                    div.appendChild(img);
                }

                // 내용
                const content = document.createElement('div');
                content.className = 'content relative z-10 flex flex-col items-center justify-center h-full px-4';
                content.innerHTML = `
                    <div class="text-6xl font-bold title tracking-tighter text-white drop-shadow-md">${cell.number}</div>
                    ${cell.mission ? `<div class="mt-4 text-xs leading-tight text-zinc-300 line-clamp-3 max-w-[90%]">${cell.mission}</div>` : ''}
                `;
                div.appendChild(content);

                // 클릭 이벤트 (마킹 + 정보 보기)
                div.onclick = (e) => {
                    if (e.detail === 2) { // 더블클릭 = 정보 보기
                        showCellInfo(index);
                    } else {
                        toggleMark(index);
                    }
                };
                board.appendChild(div);
            });
        }

        function toggleMark(index) {
            let markedSet = groupMarked[currentGroup];
            if (!markedSet) {
                groupMarked[currentGroup] = [];
                markedSet = groupMarked[currentGroup];
            }
            
            const set = new Set(markedSet);
            if (set.has(index)) {
                set.delete(index);
            } else {
                set.add(index);
            }
            groupMarked[currentGroup] = Array.from(set);
            
            saveData();
            renderBoard();
            checkBingo();
        }

        function showCellInfo(index) {
            const cell = sharedCells[index];
            document.getElementById('info-number').textContent = cell.number;
            document.getElementById('info-mission').textContent = cell.mission || '미션이 없습니다';
            
            const photoDiv = document.getElementById('info-photo');
            if (cell.photo) {
                photoDiv.innerHTML = `<img src="${cell.photo}" class="w-full h-full object-cover">`;
            } else {
                photoDiv.innerHTML = `<div class="w-full h-full bg-zinc-800 flex items-center justify-center text-6xl">📸</div>`;
            }
            
            document.getElementById('cell-info').classList.remove('hidden');
            document.getElementById('cell-info').dataset.index = index;
        }

        function closeCellInfo() {
            document.getElementById('cell-info').classList.add('hidden');
        }

        function checkBingo() {
            const markedSet = new Set(groupMarked[currentGroup] || []);
            const size = 4;
            
            // 행 체크
            for (let r = 0; r < size; r++) {
                if (Array.from({length: size}, (_, c) => r*size + c).every(i => markedSet.has(i))) {
                    showBingoAlert();
                    return;
                }
            }
            // 열 체크
            for (let c = 0; c < size; c++) {
                if (Array.from({length: size}, (_, r) => r*size + c).every(i => markedSet.has(i))) {
                    showBingoAlert();
                    return;
                }
            }
            // 대각선
            if (Array.from({length: size}, (_, i) => i*size + i).every(i => markedSet.has(i))) {
                showBingoAlert();
                return;
            }
            if (Array.from({length: size}, (_, i) => i*size + (size-1-i)).every(i => markedSet.has(i))) {
                showBingoAlert();
            }
        }

        function showBingoAlert() {
            const div = document.createElement('div');
            div.className = 'fixed inset-0 bg-black/95 flex items-center justify-center z-[999]';
            div.innerHTML = `
                <div class="text-center">
                    <div class="text-[200px] mb-8">🎉</div>
                    <div class="title text-8xl font-bold tracking-[-4px] text-white mb-4">BINGO</div>
                    <div class="text-4xl text-emerald-400">${currentGroup}조 승리!</div>
                    <button onclick="this.closest('div').remove()" 
                            class="mt-12 px-20 py-7 bg-white text-black text-2xl font-semibold rounded-3xl hover:scale-110 transition">
                        멋져요!
                    </button>
                </div>
            `;
            document.body.appendChild(div);
        }

        // ==================== 기능 버튼 ====================
        function resetCurrentGroup() {
            if (!confirm(`${currentGroup}조의 마킹을 모두 지우시겠습니까?`)) return;
            groupMarked[currentGroup] = [];
            saveData();
            renderBoard();
        }

        function reshuffleWarning() {
            alert("번호 재배치는 관리자 페이지에서만 가능합니다.\nadmin.html로 이동해주세요.");
        }

        // ==================== 데이터 불러오기 ====================
        function showImportModal() {
            document.getElementById('import-modal').classList.remove('hidden');
            document.getElementById('import-json').focus();
        }
        function hideImportModal() {
            document.getElementById('import-modal').classList.add('hidden');
        }
        function importData() {
            try {
                const json = document.getElementById('import-json').value.trim();
                const imported = JSON.parse(json);
                
                if (imported.cells && Array.isArray(imported.cells)) {
                    sharedCells = imported.cells;
                    saveData();
                    hideImportModal();
                    renderBoard();
                    alert("✅ 모든 조의 빙고판이 업데이트되었습니다!");
                } else {
                    alert("올바른 JSON 형식이 아닙니다.");
                }
            } catch(e) {
                alert("JSON 파싱 실패. 정확히 복사했는지 확인해주세요.");
            }
        }

        // ==================== 시작 ====================
        window.onload = () => {
            loadData();
            createTabs();
            switchGroup(1);
            
            // Tailwind 실행
            document.documentElement.style.setProperty('--tw-ring-color', 'rgb(163 163 163)');
        };
    </script>
</body>
</html>
