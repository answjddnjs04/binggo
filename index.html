<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINGO 관리자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .title { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div class="max-w-7xl mx-auto px-8 py-12">
        <div class="flex justify-between items-center mb-12">
            <h1 class="title text-5xl font-bold">BINGO 관리자</h1>
            <div class="flex gap-4">
                <button onclick="exportJSON()" class="px-8 py-4 bg-emerald-600 hover:bg-emerald-500 rounded-3xl flex items-center gap-3">
                    <i class="fas fa-copy"></i> JSON 내보내기
                </button>
                <button onclick="saveAll()" class="px-8 py-4 bg-white text-black font-semibold rounded-3xl">저장</button>
            </div>
        </div>

        <div class="mb-8">
            <select id="group-select" onchange="renderAdmin()" class="bg-zinc-900 border border-zinc-700 rounded-3xl px-8 py-5 text-xl w-full max-w-xs">
                <!-- JS로 옵션 추가 -->
            </select>
        </div>

        <div id="admin-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8"></div>
    </div>

    <script>
        let sharedCells = [];
        let groupSubmissions = {};
        let currentAdminGroup = 1;
        const STORAGE_KEY = "bingo2026_v2";

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const d = JSON.parse(saved);
                sharedCells = d.cells || [];
                groupSubmissions = d.groupSubmissions || {};
            }
            renderGroupSelect();
            renderAdmin();
        }

        function renderGroupSelect() {
            const select = document.getElementById('group-select');
            select.innerHTML = '';
            for (let i = 1; i <= 6; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = `${i}조`;
                select.appendChild(opt);
            }
        }

        function renderAdmin() {
            currentAdminGroup = parseInt(document.getElementById('group-select').value);
            const container = document.getElementById('admin-grid');
            container.innerHTML = '';

            sharedCells.forEach((cell, idx) => {
                const subs = groupSubmissions[currentAdminGroup] || {};
                const submittedPhoto = subs[idx];

                const div = document.createElement('div');
                div.className = 'bg-zinc-900 border border-zinc-700 rounded-3xl p-6';
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-emerald-400 font-mono">칸 ${idx+1}</span>
                        </div>
                        <div class="text-right">
                            <div class="text-xs text-zinc-500">미션</div>
                            <div class="text-sm">${cell.mission || '미션 없음'}</div>
                        </div>
                    </div>

                    ${submittedPhoto ? `
                    <div class="mb-6 rounded-2xl overflow-hidden border border-zinc-600">
                        <img src="${submittedPhoto}" class="w-full h-56 object-cover">
                    </div>
                    <button onclick="approvePhoto(${idx})" 
                            class="w-full py-5 bg-emerald-600 hover:bg-emerald-500 rounded-3xl font-semibold text-lg">
                        ✅ 이 사진으로 미션 인증
                    </button>` : `
                    <div class="h-56 bg-zinc-800 rounded-2xl flex items-center justify-center text-zinc-500 text-lg">
                        아직 사진을 제출하지 않았습니다
                    </div>`}
                `;
                container.appendChild(div);
            });
        }

        function approvePhoto(idx) {
            const subs = groupSubmissions[currentAdminGroup] || {};
            const photo = subs[idx];
            if (!photo) return;

            if (confirm(`칸 ${idx+1}을 인증하시겠습니까?\n모든 조의 빙고판에 이 사진이 공식 인증 사진으로 표시됩니다.`)) {
                sharedCells[idx].officialPhoto = photo;
                saveData();
                alert("인증 완료되었습니다!");
                renderAdmin();
            }
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                cells: sharedCells,
                groupMarked: JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}').groupMarked || {},
                groupSubmissions: groupSubmissions
            }));
        }

        function exportJSON() {
            const data = { cells: sharedCells };
            navigator.clipboard.writeText(JSON.stringify(data, null, 2));
            alert("JSON이 클립보드에 복사되었습니다.\nindex.html에서 필요시 불러올 수 있습니다.");
        }

        window.onload = loadData;
    </script>
</body>
</html>
