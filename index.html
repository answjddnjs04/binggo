<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINGO 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .title { font-family: 'Space Grotesk', sans-serif; }
        
        .bingo-cell {
            position: relative;
            overflow: hidden;
            aspect-ratio: 1/1;
            border-radius: 28px;
            border: 3px solid #27272a;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .bingo-cell:hover {
            transform: scale(1.07);
            border-color: #a1a1aa;
        }
        
        .photo-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0.95;
            filter: brightness(0.95) contrast(1.05);
            transition: all 0.5s ease;
        }
        .bingo-cell:hover .photo-bg {
            opacity: 1;
            filter: brightness(1.05) contrast(1.1);
        }
        
        .bingo-cell.marked .photo-bg {
            opacity: 0.35;
            filter: brightness(0.7) contrast(0.9);
        }
        
        .mission-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            padding: 20px 16px 16px;
            color: white;
            font-size: 0.95rem;
            line-height: 1.4;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            min-height: 68px;
            display: flex;
            align-items: flex-end;
        }
        
        .bingo-cell.marked .mission-overlay {
            background: linear-gradient(transparent, rgba(16, 185, 129, 0.95));
            color: #000;
            font-weight: 600;
        }
        
        .neon { text-shadow: 0 0 30px rgb(163 163 163 / 0.8); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div class="max-w-6xl mx-auto px-6 py-12">
        <!-- 헤더 -->
        <div class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-3xl">🎲</div>
                <div>
                    <h1 class="title text-6xl font-bold tracking-tighter neon">BINGO</h1>
                    <p class="text-zinc-400 text-xl">2026 TEAM BATTLE</p>
                </div>
            </div>
            
            <div class="flex items-center gap-6">
                <button onclick="showImportModal()" 
                        class="flex items-center gap-2 px-6 py-3 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-2xl text-sm font-medium">
                    <i class="fas fa-download"></i>
                    <span>데이터 불러오기</span>
                </button>
                <a href="admin.html" 
                   class="flex items-center gap-2 px-7 py-3 bg-white text-black font-semibold rounded-2xl hover:scale-105 transition">
                    <i class="fas fa-cog"></i>
                    관리자 전용
                </a>
            </div>
        </div>

        <!-- 그룹 탭 -->
        <div class="flex flex-wrap gap-4 mb-12 justify-center" id="tabs"></div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <!-- 빙고판 -->
            <div class="lg:col-span-8">
                <div class="bg-zinc-900/80 backdrop-blur-2xl border border-zinc-800 rounded-3xl p-10">
                    <div class="flex items-center justify-between mb-8">
                        <div id="group-title" class="title text-6xl font-semibold text-white">1조</div>
                    </div>
                    <div id="board" class="grid grid-cols-4 gap-6"></div>
                </div>
            </div>

            <!-- 선택된 칸 상세 -->
            <div class="lg:col-span-4">
                <div onclick="closeCellInfo()" id="cell-info" 
                     class="hidden bg-zinc-900/80 backdrop-blur-2xl border border-zinc-700 rounded-3xl p-8 cursor-pointer hover:border-zinc-500 transition-all">
                    <div class="text-xs text-zinc-500 mb-3">선택된 칸 상세</div>
                    <div id="info-mission" class="text-2xl leading-relaxed text-zinc-100"></div>
                    <div id="info-photo" class="mt-8 w-full aspect-video bg-zinc-950 rounded-3xl overflow-hidden border border-zinc-600"></div>
                    <div class="mt-6 text-xs text-zinc-500">사진이 크게 표시됩니다 • 다시 클릭하면 닫힘</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 데이터 불러오기 모달 -->
    <div id="import-modal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center">
        <div class="bg-zinc-900 rounded-3xl p-10 max-w-lg w-full mx-4">
            <h3 class="title text-3xl font-semibold mb-6">관리자 JSON 불러오기</h3>
            <textarea id="import-json" rows="10" 
                      class="w-full bg-black border border-zinc-700 rounded-3xl p-6 font-mono text-sm resize-y min-h-[220px]"></textarea>
            <div class="flex gap-4 mt-8">
                <button onclick="hideImportModal()" 
                        class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-3xl font-medium">취소</button>
                <button onclick="importData()" 
                        class="flex-1 py-4 bg-white text-black font-semibold rounded-3xl">불러오기 & 적용</button>
            </div>
        </div>
    </div>

    <script>
        let sharedCells = [];
        let groupMarked = {};
        let currentGroup = 1;
        const STORAGE_KEY = "bingo2026_shared";

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                sharedCells = data.cells || [];
                groupMarked = data.groupMarked || {};
            } else {
                sharedCells = Array.from({length: 16}, (_, i) => ({
                    number: i + 1,
                    mission: "",
                    photo: ""
                }));
                groupMarked = {};
            }
            for (let g = 1; g <= 6; g++) {
                if (!groupMarked[g]) groupMarked[g] = [];
            }
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                cells: sharedCells,
                groupMarked: groupMarked
            }));
        }

        function createTabs() {
            const container = document.getElementById('tabs');
            container.innerHTML = '';
            for (let i = 1; i <= 6; i++) {
                const btn = document.createElement('button');
                btn.className = `px-10 py-5 text-2xl font-semibold rounded-3xl transition-all ${i===1 ? 'bg-white text-black shadow-2xl' : 'bg-zinc-900 hover:bg-zinc-800 border border-zinc-700'}`;
                btn.textContent = `${i}조`;
                btn.onclick = () => switchGroup(i);
                container.appendChild(btn);
            }
        }

        function switchGroup(g) {
            currentGroup = g;
            document.querySelectorAll('#tabs button').forEach(btn => {
                const active = parseInt(btn.textContent) === g;
                if (active) {
                    btn.classList.add('bg-white', 'text-black', 'shadow-2xl');
                    btn.classList.remove('bg-zinc-900', 'border', 'border-zinc-700');
                } else {
                    btn.classList.remove('bg-white', 'text-black', 'shadow-2xl');
                    btn.classList.add('bg-zinc-900', 'border', 'border-zinc-700');
                }
            });
            document.getElementById('group-title').textContent = `${g}조`;
            renderBoard();
        }

        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            const markedSet = new Set(groupMarked[currentGroup] || []);
            
            sharedCells.forEach((cell, index) => {
                const div = document.createElement('div');
                div.className = `bingo-cell cursor-pointer`;
                if (markedSet.has(index)) div.classList.add('marked');

                let html = `<div class="photo-bg" style="background-image: url('${cell.photo || 'https://picsum.photos/id/1015/800/600'}')}"></div>`;
                
                html += `
                    <div class="mission-overlay">
                        ${cell.mission ? cell.mission : '<span class="opacity-40">미션 없음</span>'}
                    </div>
                `;

                div.innerHTML = html;

                div.addEventListener('click', (e) => {
                    if (e.detail === 2) {
                        showCellInfo(index);
                    } else {
                        toggleMark(index);
                    }
                });

                board.appendChild(div);
            });
        }

        function toggleMark(index) {
            let marked = groupMarked[currentGroup] || [];
            const set = new Set(marked);
            if (set.has(index)) set.delete(index); else set.add(index);
            groupMarked[currentGroup] = Array.from(set);
            saveData();
            renderBoard();
            checkBingo();
        }

        function showCellInfo(index) {
            const cell = sharedCells[index];
            document.getElementById('info-mission').innerHTML = cell.mission 
                ? `<span class="text-emerald-400">미션:</span> ${cell.mission}` 
                : '미션이 없습니다';
            
            const photoDiv = document.getElementById('info-photo');
            if (cell.photo) {
                photoDiv.innerHTML = `<img src="${cell.photo}" class="w-full h-full object-cover">`;
            } else {
                photoDiv.innerHTML = `<div class="w-full h-full bg-zinc-800 flex items-center justify-center text-7xl">📸</div>`;
            }
            document.getElementById('cell-info').classList.remove('hidden');
        }

        function closeCellInfo() {
            document.getElementById('cell-info').classList.add('hidden');
        }

        function checkBingo() {
            const markedSet = new Set(groupMarked[currentGroup] || []);
            const size = 4;
            for (let r = 0; r < size; r++) {
                if (Array.from({length: size}, (_, c) => r * size + c).every(i => markedSet.has(i))) return showBingoAlert();
            }
            for (let c = 0; c < size; c++) {
                if (Array.from({length: size}, (_, r) => r * size + c).every(i => markedSet.has(i))) return showBingoAlert();
            }
            if (Array.from({length: size}, (_, i) => i * size + i).every(i => markedSet.has(i))) return showBingoAlert();
            if (Array.from({length: size}, (_, i) => i * size + (size - 1 - i)).every(i => markedSet.has(i))) return showBingoAlert();
        }

        function showBingoAlert() {
            const div = document.createElement('div');
            div.className = 'fixed inset-0 bg-black/95 flex items-center justify-center z-[999]';
            div.innerHTML = `
                <div class="text-center">
                    <div class="text-[200px] mb-4">🎉</div>
                    <div class="title text-8xl font-bold tracking-tighter text-white">BINGO!</div>
                    <div class="text-5xl text-emerald-400 mt-3">${currentGroup}조 완성</div>
                    <button onclick="this.closest('div').remove()" class="mt-12 px-16 py-6 bg-white text-black text-2xl font-semibold rounded-3xl">축하합니다</button>
                </div>
            `;
            document.body.appendChild(div);
        }

        function showImportModal() { document.getElementById('import-modal').classList.remove('hidden'); }
        function hideImportModal() { document.getElementById('import-modal').classList.add('hidden'); }
        
        function importData() {
            try {
                const json = document.getElementById('import-json').value.trim();
                const imported = JSON.parse(json);
                if (imported.cells) {
                    sharedCells = imported.cells;
                    saveData();
                    hideImportModal();
                    renderBoard();
                    alert('✅ 모든 조 동일 적용 완료 (사진은 각 칸별로 다르게 설정됨)');
                }
            } catch(e) {
                alert('JSON 오류입니다. 관리자 페이지에서 정확히 복사해주세요.');
            }
        }

        window.onload = () => {
            loadData();
            createTabs();
            switchGroup(1);
        };
    </script>
</body>
</html>
