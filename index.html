<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINGO 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .title { font-family: 'Space Grotesk', sans-serif; }
        
        .bingo-cell {
            position: relative;
            aspect-ratio: 1/1;
            border-radius: 28px;
            overflow: hidden;
            border: 3px solid #27272a;
            transition: all 0.4s cubic-bezier(0.23,1,0.32,1);
            cursor: pointer;
        }
        .bingo-cell:hover { transform: scale(1.07); border-color: #71717a; }
        
        .photo-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0.95;
        }
        .bingo-cell.marked .photo-bg { opacity: 0.4; }
        
        .mission-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.92));
            padding: 20px 16px 16px;
            font-size: 0.97rem;
            line-height: 1.4;
            color: white;
        }
        .verified {
            position: absolute;
            top: 12px; right: 12px;
            background: #10b981;
            color: white;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 9999px;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.5);
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div class="max-w-6xl mx-auto px-6 py-12">
        <div class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-3xl">🎲</div>
                <div>
                    <h1 class="title text-6xl font-bold tracking-tighter">BINGO</h1>
                    <p class="text-zinc-400 text-xl">2026 TEAM BATTLE</p>
                </div>
            </div>
            <a href="admin.html" class="px-7 py-3 bg-white text-black font-semibold rounded-2xl flex items-center gap-2 hover:scale-105 transition">
                <i class="fas fa-cog"></i> 관리자 페이지
            </a>
        </div>

        <div class="flex flex-wrap gap-4 mb-12 justify-center" id="tabs"></div>

        <div class="bg-zinc-900/80 backdrop-blur-2xl border border-zinc-800 rounded-3xl p-10">
            <div class="flex justify-between items-center mb-8">
                <div id="group-title" class="title text-6xl font-semibold text-white">1조</div>
                <button onclick="resetCurrent()" 
                        class="px-6 py-3 bg-red-900/30 hover:bg-red-900/50 text-red-400 rounded-2xl flex items-center gap-2 text-sm">
                    <i class="fas fa-trash"></i> 내 진행 초기화
                </button>
            </div>
            <div id="board" class="grid grid-cols-4 gap-6"></div>
        </div>
    </div>

    <!-- 사진 크게 보기 + 제출 모달 (이전 스타일 유지) -->
    <div id="detail-modal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center">
        <div class="relative max-w-4xl w-full mx-4 bg-zinc-900 rounded-3xl p-10">
            <button onclick="closeModal()" 
                    class="absolute top-6 right-6 text-5xl text-white hover:text-red-400 transition">✕</button>
            
            <div id="modal-mission" class="text-3xl font-bold text-center mb-8"></div>
            
            <div id="modal-photo-area" class="aspect-video bg-zinc-800 rounded-3xl overflow-hidden mb-10 border border-zinc-700"></div>
            
            <div class="flex gap-4">
                <input type="file" id="file-input" accept="image/*" 
                       class="flex-1 text-sm text-zinc-400 file:mr-4 file:py-4 file:px-6 file:rounded-2xl file:border-0 file:bg-zinc-800 file:text-white">
                <button onclick="submitPhoto()" 
                        class="px-12 py-4 bg-emerald-600 hover:bg-emerald-500 rounded-3xl font-semibold">이 미션 사진 제출</button>
            </div>
        </div>
    </div>

    <script>
        let sharedCells = [];           // [{mission: "...", approved: {1: url, 2: url, ...}, pending: {1: url, ...}}]
        let groupMarked = {};
        let currentGroup = 1;
        let currentIdx = -1;
        const STORAGE_KEY = "bingo2026_pro";

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const d = JSON.parse(saved);
                sharedCells = d.cells || Array.from({length:16}, () => ({mission: "", approved: {}, pending: {}}));
                groupMarked = d.groupMarked || {};
            } else {
                sharedCells = Array.from({length:16}, () => ({mission: "", approved: {}, pending: {}}));
                groupMarked = {};
            }
            for (let g = 1; g <= 6; g++) {
                if (!groupMarked[g]) groupMarked[g] = [];
            }
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({cells: sharedCells, groupMarked: groupMarked}));
        }

        function createTabs() {
            const container = document.getElementById('tabs');
            container.innerHTML = '';
            for (let i = 1; i <= 6; i++) {
                const btn = document.createElement('button');
                btn.className = `px-10 py-5 text-2xl font-semibold rounded-3xl transition-all ${i === currentGroup ? 'bg-white text-black shadow-2xl' : 'bg-zinc-900 hover:bg-zinc-800 border border-zinc-700'}`;
                btn.textContent = `${i}조`;
                btn.onclick = () => switchGroup(i);
                container.appendChild(btn);
            }
        }

        function switchGroup(g) {
            currentGroup = g;
            createTabs();
            document.getElementById('group-title').textContent = `${g}조`;
            renderBoard();
        }

        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            const marked = new Set(groupMarked[currentGroup] || []);

            sharedCells.forEach((cell, idx) => {
                const div = document.createElement('div');
                div.className = `bingo-cell ${marked.has(idx) ? 'marked' : ''}`;
                
                const photo = cell.approved[currentGroup] || '';
                div.innerHTML = `
                    <div class="photo-bg" style="background-image: url('${photo || 'https://picsum.photos/id/1015/800/600'}')"></div>
                    <div class="mission-overlay">${cell.mission || '미션 없음'}</div>
                    ${photo ? `<div class="verified">✓ 인증됨</div>` : ''}
                `;

                div.onclick = () => openDetailModal(idx);
                board.appendChild(div);
            });
        }

        function openDetailModal(idx) {
            currentIdx = idx;
            const cell = sharedCells[idx];
            document.getElementById('modal-mission').textContent = cell.mission || `칸 ${idx+1} 미션`;
            
            const photoArea = document.getElementById('modal-photo-area');
            const approvedPhoto = cell.approved[currentGroup];
            photoArea.innerHTML = approvedPhoto 
                ? `<img src="${approvedPhoto}" class="w-full h-full object-cover">`
                : `<div class="w-full h-full flex items-center justify-center text-8xl text-zinc-600">📸</div>`;

            document.getElementById('detail-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.add('hidden');
        }

        function submitPhoto() {
            const file = document.getElementById('file-input').files[0];
            if (!file) return alert("사진을 선택해주세요.");

            const reader = new FileReader();
            reader.onload = (e) => {
                if (!sharedCells[currentIdx].pending) sharedCells[currentIdx].pending = {};
                sharedCells[currentIdx].pending[currentGroup] = e.target.result;
                saveData();
                closeModal();
                alert(`사진이 관리자에게 제출되었습니다.\n${currentGroup}조 ${sharedCells[currentIdx].mission} 미션`);
            };
            reader.readAsDataURL(file);
        }

        function checkBingo() {
            const marked = new Set(groupMarked[currentGroup] || []);
            const size = 4;
            for (let r = 0; r < size; r++) {
                if ([...Array(size)].every((_,c) => marked.has(r*size + c))) return showBingoAlert();
            }
            for (let c = 0; c < size; c++) {
                if ([...Array(size)].every((_,r) => marked.has(r*size + c))) return showBingoAlert();
            }
            if ([...Array(size)].every((_,i) => marked.has(i*size + i))) return showBingoAlert();
            if ([...Array(size)].every((_,i) => marked.has(i*size + (size-1-i)))) return showBingoAlert();
        }

        function showBingoAlert() {
            const div = document.createElement('div');
            div.className = 'fixed inset-0 bg-black/95 flex items-center justify-center z-[999]';
            div.innerHTML = `
                <div class="text-center">
                    <div class="text-[180px] mb-6">🎉</div>
                    <div class="title text-8xl font-bold text-white tracking-tighter">BINGO!</div>
                    <div class="text-5xl text-emerald-400 mt-4">${currentGroup}조 완성</div>
                    <button onclick="this.closest('div').remove()" class="mt-12 px-16 py-6 bg-white text-black text-2xl font-semibold rounded-3xl">축하합니다</button>
                </div>
            `;
            document.body.appendChild(div);
        }

        function resetCurrent() {
            if (!confirm(`${currentGroup}조의 모든 마킹을 초기화할까요?`)) return;
            groupMarked[currentGroup] = [];
            saveData();
            renderBoard();
        }

        window.onload = () => {
            loadData();
            createTabs();
            switchGroup(1);
        };
    </script>
</body>
</html>
