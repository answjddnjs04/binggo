<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINGO 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600;700&display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }
        
        .bingo-cell {
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .bingo-cell:hover {
            transform: translateY(-4px) scale(1.03);
        }
        .bingo-cell.marked {
            background: linear-gradient(135deg, #22c55e, #86efac) !important;
            color: #000 !important;
            border-color: #86efac;
        }
        .neon-text {
            text-shadow: 0 0 20px rgb(163 163 163);
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
    <div class="max-w-6xl mx-auto px-6 py-12">
        <!-- 헤더 -->
        <div class="flex justify-between items-end mb-16">
            <div>
                <h1 class="title-font text-7xl font-bold tracking-tighter neon-text">BINGO</h1>
                <p class="text-2xl text-zinc-400 mt-2">2026 TEAM EVENT</p>
            </div>
            <a href="admin.html" 
               class="flex items-center gap-3 px-6 py-3 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded-2xl text-sm font-medium transition">
                <i class="fas fa-cog"></i>
                <span>관리자 페이지</span>
            </a>
        </div>

        <!-- 그룹 탭 -->
        <div class="flex flex-wrap gap-3 mb-12" id="tabs">
            <!-- JavaScript로 생성 -->
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <!-- 빙고판 -->
            <div class="lg:col-span-7">
                <div class="bg-zinc-900/70 backdrop-blur-xl border border-zinc-800 rounded-3xl p-10">
                    <div class="flex items-center justify-between mb-8">
                        <div id="current-group" class="title-font text-6xl font-semibold text-white">1조</div>
                        <div class="flex gap-4">
                            <button onclick="reshuffleCurrent()" 
                                    class="flex items-center gap-2 px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl transition">
                                <i class="fas fa-dice"></i>
                                <span class="font-medium">번호 재배치</span>
                            </button>
                            <button onclick="resetCurrent()" 
                                    class="flex items-center gap-2 px-6 py-3 bg-zinc-800 hover:bg-red-950/50 text-red-400 rounded-2xl transition">
                                <i class="fas fa-trash"></i>
                                <span class="font-medium">초기화</span>
                            </button>
                        </div>
                    </div>

                    <!-- 빙고판 -->
                    <div id="board" class="grid grid-cols-4 gap-4">
                        <!-- JS로 생성 -->
                    </div>
                </div>
            </div>

            <!-- 사이드 정보 (미션 + 사진) -->
            <div class="lg:col-span-5 space-y-8">
                <!-- 미션 카드 -->
                <div class="bg-zinc-900/70 backdrop-blur-xl border border-zinc-800 rounded-3xl p-8">
                    <div class="uppercase tracking-widest text-xs text-zinc-500 mb-3">TODAY'S MISSION</div>
                    <div id="mission-text" class="text-2xl leading-relaxed text-zinc-100">
                        <!-- JS로 채워짐 -->
                    </div>
                </div>

                <!-- 사진 영역 -->
                <div class="bg-zinc-900/70 backdrop-blur-xl border border-zinc-800 rounded-3xl overflow-hidden">
                    <div class="uppercase tracking-widest text-xs text-zinc-500 px-8 pt-8 pb-3">TEAM PHOTO</div>
                    <div id="team-photo" class="aspect-video bg-zinc-950 flex items-center justify-center text-zinc-600">
                        <!-- JS로 이미지 삽입 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ====================== 데이터 ======================
        let boardsData = {};
        let sharedDataForGroup6 = { numbers: [], mission: "", photoUrl: "" };
        let currentGroup = 1;
        const ADMIN_PASSWORD = "1234"; // 실제 배포 시 반드시 변경하세요!

        // 1~5조는 개별, 6조는 공유
        function initBoards() {
            for (let g = 1; g <= 5; g++) {
                let nums = Array.from({length: 16}, (_, i) => i + 1);
                nums.sort(() => Math.random() - 0.5);
                boardsData[g] = {
                    numbers: nums,
                    marked: new Set(),
                    mission: "미션 내용을 관리자 페이지에서 설정해주세요",
                    photoUrl: "https://picsum.photos/id/1015/800/450"
                };
            }
            // 6조 초기값
            sharedDataForGroup6 = {
                numbers: Array.from({length: 16}, (_, i) => i + 1).sort(() => Math.random() - 0.5),
                mission: "6조 전용 미션 - 관리자에서 수정 가능",
                photoUrl: "https://picsum.photos/id/201/800/450"
            };
        }

        // ====================== UI ======================
        function createTabs() {
            const container = document.getElementById('tabs');
            for (let i = 1; i <= 6; i++) {
                const btn = document.createElement('button');
                btn.className = `px-10 py-5 text-2xl font-semibold rounded-3xl transition-all ${i === 1 ? 'bg-white text-black shadow-xl' : 'bg-zinc-900 hover:bg-zinc-800 border border-zinc-700'}`;
                btn.textContent = `${i}조`;
                btn.onclick = () => switchGroup(i);
                container.appendChild(btn);
            }
        }

        function switchGroup(group) {
            currentGroup = group;
            
            // 탭 스타일
            document.querySelectorAll('#tabs button').forEach((btn, idx) => {
                if (parseInt(btn.textContent) === group) {
                    btn.classList.add('bg-white', 'text-black', 'shadow-xl');
                    btn.classList.remove('bg-zinc-900', 'hover:bg-zinc-800', 'border', 'border-zinc-700');
                } else {
                    btn.classList.remove('bg-white', 'text-black', 'shadow-xl');
                    btn.classList.add('bg-zinc-900', 'hover:bg-zinc-800', 'border', 'border-zinc-700');
                }
            });

            document.getElementById('current-group').textContent = `${group}조`;
            renderBoard();
            renderSideInfo();
        }

        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            let data = currentGroup === 6 ? sharedDataForGroup6 : boardsData[currentGroup];
            
            data.numbers.forEach((num, idx) => {
                const cell = document.createElement('div');
                cell.className = `
                    bingo-cell aspect-square flex items-center justify-center 
                    bg-zinc-900 border-2 border-zinc-700 hover:border-zinc-400 
                    text-5xl font-bold rounded-2xl cursor-pointer select-none relative overflow-hidden
                `;
                if (data.marked.has(idx)) cell.classList.add('marked');
                
                cell.innerHTML = `<span>${num}</span>`;
                cell.onclick = () => toggleMark(idx);
                board.appendChild(cell);
            });
        }

        function toggleMark(idx) {
            let data = currentGroup === 6 ? sharedDataForGroup6 : boardsData[currentGroup];
            if (data.marked.has(idx)) {
                data.marked.delete(idx);
            } else {
                data.marked.add(idx);
            }
            renderBoard();
            checkBingo();
        }

        function renderSideInfo() {
            let data = currentGroup === 6 ? sharedDataForGroup6 : boardsData[currentGroup];
            
            document.getElementById('mission-text').textContent = data.mission;
            
            const photoDiv = document.getElementById('team-photo');
            if (data.photoUrl) {
                photoDiv.innerHTML = `<img src="${data.photoUrl}" class="w-full h-full object-cover">`;
            } else {
                photoDiv.innerHTML = `<span class="text-4xl">📸</span>`;
            }
        }

        function checkBingo() {
            let data = currentGroup === 6 ? sharedDataForGroup6 : boardsData[currentGroup];
            // (기존 빙고 체크 로직 그대로 사용)
            const size = 4;
            const marked = data.marked;
            
            // 행, 열, 대각선 체크 (생략 없이 전체 넣음)
            for (let r = 0; r < size; r++) {
                if ([...Array(size).keys()].every(c => marked.has(r*size + c))) return showBingo();
            }
            for (let c = 0; c < size; c++) {
                if ([...Array(size).keys()].every(r => marked.has(r*size + c))) return showBingo();
            }
            if ([...Array(size).keys()].every(i => marked.has(i*size + i))) return showBingo();
            if ([...Array(size).keys()].every(i => marked.has(i*size + (size-1-i)))) return showBingo();
        }

        function showBingo() {
            const alert = document.createElement('div');
            alert.className = "fixed inset-0 bg-black/90 flex items-center justify-center z-50";
            alert.innerHTML = `
                <div class="text-center">
                    <div class="text-[180px] leading-none mb-6">🎉</div>
                    <div class="title-font text-8xl font-bold text-white tracking-tighter mb-4">BINGO</div>
                    <div class="text-4xl text-emerald-400">${currentGroup}조 완성!</div>
                    <button onclick="this.closest('.fixed').remove()" 
                            class="mt-12 px-16 py-6 bg-white text-black font-semibold text-2xl rounded-2xl hover:scale-105 transition">
                        확인
                    </button>
                </div>
            `;
            document.body.appendChild(alert);
        }

        function reshuffleCurrent() {
            if (currentGroup === 6) {
                sharedDataForGroup6.numbers = Array.from({length:16}, (_,i)=>i+1).sort(()=>Math.random()-0.5);
            } else {
                boardsData[currentGroup].numbers = Array.from({length:16}, (_,i)=>i+1).sort(()=>Math.random()-0.5);
            }
            boardsData[currentGroup].marked.clear();
            renderBoard();
        }

        function resetCurrent() {
            if (!confirm(`${currentGroup}조를 초기화하시겠습니까?`)) return;
            let data = currentGroup === 6 ? sharedDataForGroup6 : boardsData[currentGroup];
            data.marked.clear();
            renderBoard();
        }

        // ====================== 관리자 페이지 ======================
        // admin.html 파일을 따로 만들어 아래 코드를 넣어주세요.
        // (필요하시면 admin.html 전체 코드도 바로 드리겠습니다)

        // 초기 실행
        window.onload = () => {
            initBoards();
            createTabs();
            switchGroup(1);
        };
    </script>
</body>
</html>
