<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINGO 관리자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .title { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div class="max-w-7xl mx-auto px-8 py-12">
        <div class="flex justify-between items-center mb-12">
            <h1 class="title text-5xl font-bold">BINGO 관리자</h1>
            <button onclick="saveAll()" class="px-8 py-4 bg-white text-black font-semibold rounded-3xl">저장</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8" id="admin-grid"></div>
    </div>

    <script>
        let sharedCells = [];
        const STORAGE_KEY = "bingo2026_final";

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) sharedCells = JSON.parse(saved).cells || [];
            renderAdmin();
        }

        function renderAdmin() {
            const container = document.getElementById('admin-grid');
            container.innerHTML = '';
            sharedCells.forEach((cell, idx) => {
                const div = document.createElement('div');
                div.className = 'bg-zinc-900 border border-zinc-700 rounded-3xl p-6';
                div.innerHTML = `
                    <textarea rows="3" class="w-full bg-black border border-zinc-700 rounded-2xl p-4 text-sm mb-4" 
                              onchange="sharedCells[${idx}].mission = this.value">${cell.mission || ''}</textarea>
                    
                    <div class="text-sm text-zinc-400 mb-2">제출된 사진 (조별)</div>
                    ${Object.keys(cell.submissions || {}).map(g => `
                        <div class="mb-6">
                            <div class="text-emerald-400 mb-2">${g}조 제출</div>
                            <img src="${cell.submissions[g]}" class="w-full rounded-2xl border border-zinc-600 mb-2">
                            <button onclick="approvePhoto(${idx}, ${g})" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-semibold">
                                ✅ ${g}조 인증
                            </button>
                        </div>
                    `).join('') || '<div class="h-40 bg-zinc-800 rounded-2xl flex items-center justify-center text-zinc-500">아직 제출 없음</div>'}
                `;
                container.appendChild(div);
            });
        }

        function approvePhoto(idx, group) {
            const photo = sharedCells[idx].submissions[group];
            if (!photo) return;
            if (!sharedCells[idx].approvedPhotos) sharedCells[idx].approvedPhotos = {};
            sharedCells[idx].approvedPhotos[group] = photo;
            delete sharedCells[idx].submissions[group];
            saveData();
            alert(`${group}조 칸 ${idx+1} 인증 완료!`);
            renderAdmin();
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({cells: sharedCells}));
            alert("미션 저장 완료! index.html 새로고침");
        }

        window.onload = loadData;
    </script>
</body>
</html>
