<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 - BINGO 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .title { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div class="max-w-7xl mx-auto px-8 py-12">
        <div class="flex justify-between items-center mb-12">
            <h1 class="title text-5xl font-bold">관리자 페이지</h1>
            <div class="flex gap-4">
                <button onclick="exportJSON()" 
                        class="px-8 py-4 bg-emerald-600 hover:bg-emerald-500 rounded-2xl flex items-center gap-3">
                    <i class="fas fa-copy"></i>
                    <span>JSON 내보내기 (참가자 공유용)</span>
                </button>
                <button onclick="saveAll()" 
                        class="px-8 py-4 bg-white text-black font-semibold rounded-2xl">💾 모든 변경 저장</button>
            </div>
        </div>

        <div class="flex gap-6 mb-6">
            <button onclick="shuffleNumbers()" 
                    class="px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl flex items-center gap-2">
                <i class="fas fa-dice"></i> 번호만 랜덤 셔플
            </button>
            <button onclick="resetAll()" 
                    class="px-6 py-3 bg-red-900/30 text-red-400 hover:bg-red-900/50 rounded-2xl">전체 초기화</button>
        </div>

        <div id="admin-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
    </div>

    <script>
        let sharedCells = [];

        const STORAGE_KEY = "bingo2026_shared";

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                sharedCells = JSON.parse(saved).cells || [];
            } else {
                sharedCells = Array.from({length:16}, (_,i) => ({
                    number: i+1,
                    mission: "",
                    photo: ""
                }));
            }
            renderAdminGrid();
        }

        function renderAdminGrid() {
            const container = document.getElementById('admin-grid');
            container.innerHTML = '';
            
            sharedCells.forEach((cell, i) => {
                const div = document.createElement('div');
                div.className = 'bg-zinc-900 border border-zinc-700 rounded-3xl p-6';
                div.innerHTML = `
                    <div class="text-xs text-zinc-500 mb-2">칸 ${i+1}</div>
                    <input type="number" value="${cell.number}" 
                           class="w-full bg-black border border-zinc-700 rounded-2xl px-5 py-3 text-4xl font-bold text-center mb-4 focus:outline-none focus:border-white"
                           onchange="updateCell(${i}, 'number', this.value)">
                    
                    <textarea placeholder="미션 내용 (한 줄 추천)" rows="3"
                              class="w-full bg-black border border-zinc-700 rounded-2xl px-5 py-4 text-sm resize-none mb-4 focus:outline-none focus:border-white"
                              onchange="updateCell(${i}, 'mission', this.value)">${cell.mission || ''}</textarea>
                    
                    <div class="flex gap-3">
                        <input type="text" placeholder="사진 URL" value="${cell.photo || ''}"
                               class="flex-1 bg-black border border-zinc-700 rounded-2xl px-5 py-3 text-xs focus:outline-none focus:border-white"
                               onchange="updateCell(${i}, 'photo', this.value)">
                        <button onclick="previewPhoto(${i})" 
                                class="px-5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-xs">미리보기</button>
                    </div>
                    
                    ${cell.photo ? `<img src="${cell.photo}" class="mt-4 w-full h-28 object-cover rounded-2xl border border-zinc-700">` : ''}
                `;
                container.appendChild(div);
            });
        }

        function updateCell(index, key, value) {
            sharedCells[index][key] = value;
        }

        function saveAll() {
            const fullData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            fullData.cells = sharedCells;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(fullData));
            alert("✅ 모든 조에 즉시 적용되었습니다!\nindex.html을 새로고침하세요.");
        }

        function shuffleNumbers() {
            let nums = Array.from({length:16}, (_,i)=>i+1);
            nums.sort(() => Math.random() - 0.5);
            sharedCells.forEach((c, i) => c.number = nums[i]);
            renderAdminGrid();
        }

        function exportJSON() {
            const exportData = { cells: sharedCells };
            navigator.clipboard.writeText(JSON.stringify(exportData, null, 2));
            alert("✅ JSON이 클립보드에 복사되었습니다!\nindex.html에서 '데이터 불러오기' 버튼으로 참가자에게 공유하세요.");
        }

        function previewPhoto(i) {
            const url = sharedCells[i].photo;
            if (url) window.open(url, '_blank');
        }

        function resetAll() {
            if (!confirm("정말 모든 칸을 초기화하시겠습니까?")) return;
            sharedCells = Array.from({length:16}, (_,i) => ({number: i+1, mission: "", photo: ""}));
            renderAdminGrid();
        }

        window.onload = loadData;
    </script>
</body>
</html>
