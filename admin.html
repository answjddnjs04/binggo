<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINGO 관리자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .title { font-family: 'Space Grotesk', sans-serif; }
        
        .pending-photo {
            transition: all 0.3s;
        }
        .pending-photo:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div class="max-w-7xl mx-auto px-4 md:px-8 py-8 md:py-12">
        <div class="flex justify-between items-center mb-10">
            <h1 class="title text-5xl font-bold">BINGO 관리자</h1>
            <button onclick="saveAll()" 
                    class="px-8 py-4 bg-white text-black font-semibold rounded-3xl hover:bg-zinc-100 transition">
                💾 모든 변경 저장
            </button>
        </div>

        <!-- 7개 탭 -->
        <div class="flex flex-wrap gap-2 mb-10 bg-zinc-900 p-2 rounded-3xl" id="admin-tabs"></div>

        <!-- 내용 영역 -->
        <div id="content" class="bg-zinc-900 rounded-3xl p-8 min-h-[650px]"></div>
    </div>

    <script>
        let sharedCells = [];
        const STORAGE_KEY = "bingo2026_pro";

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const d = JSON.parse(saved);
                sharedCells = d.cells || Array.from({length:16}, () => ({mission: "", approved: {}, pending: {}}));
            } else {
                sharedCells = Array.from({length:16}, () => ({mission: "", approved: {}, pending: {}}));
            }
            renderTabs();
            showMissionTab();
        }

        function renderTabs() {
            const container = document.getElementById('admin-tabs');
            container.innerHTML = `
                <button onclick="showMissionTab()" 
                        class="tab-btn flex-1 py-4 text-lg font-semibold rounded-3xl bg-emerald-600 text-black">
                    1. 미션 설정
                </button>
            `;
            for (let g = 1; g <= 6; g++) {
                const btn = document.createElement('button');
                btn.className = `tab-btn flex-1 py-4 text-lg font-semibold rounded-3xl bg-zinc-800 hover:bg-zinc-700`;
                btn.textContent = `${g}조 관리`;
                btn.onclick = () => showGroupTab(g);
                container.appendChild(btn);
            }
        }

        // ==================== 1. 미션 설정 탭 ====================
        function showMissionTab() {
            let html = `<h2 class="text-3xl font-semibold mb-8">미션 설정 (모든 조 공통)</h2>`;
            html += `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">`;
            
            sharedCells.forEach((cell, i) => {
                html += `
                    <div class="bg-zinc-800 rounded-3xl p-6">
                        <div class="text-emerald-400 text-sm mb-3">칸 ${i+1}</div>
                        <textarea rows="4" class="w-full bg-black border border-zinc-700 rounded-2xl p-5 text-sm resize-y" 
                                  onchange="sharedCells[${i}].mission = this.value">${cell.mission || ''}</textarea>
                    </div>`;
            });
            
            html += `</div>`;
            document.getElementById('content').innerHTML = html;
        }

        // ==================== 조별 관리 탭 ====================
        function showGroupTab(group) {
            let left = `
                <div class="lg:w-5/12">
                    <h3 class="text-2xl font-semibold mb-6">${group}조 빙고판 (현재 상태)</h3>
                    <div class="grid grid-cols-4 gap-4">`;
            
            sharedCells.forEach((cell, idx) => {
                const photo = cell.approved[group] || '';
                left += `
                    <div class="aspect-square rounded-2xl border border-zinc-700 overflow-hidden ${photo ? '' : 'bg-zinc-700'}"
                         style="background-image: url('${photo || ''}'); background-size: cover; background-position: center;">
                    </div>`;
            });
            left += `</div></div>`;

            let right = `
                <div class="lg:w-7/12 lg:pl-12">
                    <h3 class="text-2xl font-semibold mb-6">${group}조 제출된 사진</h3>`;

            let hasPending = false;
            sharedCells.forEach((cell, idx) => {
                if (cell.pending && cell.pending[group] && cell.pending[group].length > 0) {
                    hasPending = true;
                    cell.pending[group].forEach((photoUrl, pIdx) => {
                        right += `
                            <div class="bg-zinc-800 rounded-3xl p-6 mb-8 pending-photo">
                                <div class="font-medium text-lg mb-4">${cell.mission || '미션 없음'}</div>
                                <img src="${photoUrl}" class="w-full rounded-2xl mb-6 border border-zinc-600">
                                <button onclick="approvePhoto(${idx}, ${group}, ${pIdx})" 
                                        class="w-full py-5 bg-emerald-600 hover:bg-emerald-500 rounded-3xl font-bold text-lg">
                                    ✅ 이 사진 승인
                                </button>
                            </div>`;
                    });
                }
            });

            if (!hasPending) {
                right += `<div class="bg-zinc-800 rounded-3xl py-20 text-center text-zinc-500">아직 제출된 사진이 없습니다.</div>`;
            }
            right += `</div>`;

            document.getElementById('content').innerHTML = `
                <div class="flex flex-col lg:flex-row gap-10">
                    ${left}
                    ${right}
                </div>`;
        }

        function approvePhoto(idx, group, pIdx) {
            const photoUrl = sharedCells[idx].pending[group][pIdx];
            
            if (!sharedCells[idx].approved) sharedCells[idx].approved = {};
            sharedCells[idx].approved[group] = photoUrl;
            
            // 승인 후 대기 목록에서 제거
            sharedCells[idx].pending[group].splice(pIdx, 1);
            if (sharedCells[idx].pending[group].length === 0) {
                delete sharedCells[idx].pending[group];
            }

            saveAll();
            alert(`${group}조 - "${sharedCells[idx].mission}" 미션 사진이 승인되었습니다.`);
            showGroupTab(group);
        }

        function saveAll() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({cells: sharedCells}));
            alert("✅ 모든 내용이 저장되었습니다.\nindex.html을 새로고침하면 적용됩니다.");
        }

        window.onload = loadData;
    </script>
</body>
</html>
